name: Build LBox IPA — Liquid Glass (unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project LBox.xcodeproj \
            -scheme LBox \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            build

      - name: Package unsigned IPA
        run: |
          BUILD_DIR=$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos
          PAYLOAD_DIR=$RUNNER_TEMP/Payload
          mkdir -p "$PAYLOAD_DIR"
          cp -r "$BUILD_DIR/LBox.app" "$PAYLOAD_DIR/LBox.app"
          cd $RUNNER_TEMP
          zip -r LBox-LiquidGlass-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LBox-LiquidGlass-unsigned
          path: ${{ runner.temp }}/LBox-LiquidGlass-unsigned.ipa
          retention-days: 30
